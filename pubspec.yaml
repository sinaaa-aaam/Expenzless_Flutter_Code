name: expenzless
description: Smart mobile expense tracker for small business owners.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.9

  # State Management
  provider: ^6.1.1

  # Local Storage / Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Background Tasks
  workmanager: ^0.5.2

  # Local Notifications
  flutter_local_notifications: ^16.3.0

  # Camera & Image
  image_picker: ^1.0.7

  # Location / GPS
  geolocator: ^11.0.0

  # Networking
  http: ^1.2.0
  connectivity_plus: ^5.0.2

  # UI & Charts
  fl_chart: ^0.66.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  google_fonts: ^6.1.0

  # Utilities
  uuid: ^4.3.3
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  csv: ^6.0.0
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
